<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenBlock Web</title>
    <style>
        body {
            background-color: #4D97FF;
        }

        .splash {
            color: white;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            font-size: xx-large;
            font-weight: bolder;
            margin: 0;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
    <!-- Electron shim: provides browser-compatible stubs for ipcRenderer, fs, path, etc. -->
    <script src="electron-shim.js?v=8"></script>
    <!-- Web Serial Flasher 模組 -->
    <script src="web-flasher/SerialManager.js"></script>
    <script src="web-flasher/Stk500WebFlasher.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js"></script>
    <script src="web-flasher/Esp32WebFlasher.js"></script>
    <script src="web-flasher/LinkIntersector.js"></script>
</head>

<body>
    <div id="app">
        <p class="splash">TubitBlock Web is loading...</p>
    </div>
    <script src="renderer.js"></script>

    <div id="stk500-test-ui"
        style="position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; padding: 15px; border-radius: 8px; z-index: 9999; box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-family: sans-serif; min-width: 250px;">
        <h4 style="margin: 0 0 10px 0; color: #3498db; border-bottom: 1px solid #555; padding-bottom: 5px;">Web Serial
            Flasher 測試</h4>

        <div style="margin-bottom: 10px;">
            <label style="font-size: 12px; display: block; margin-bottom: 3px;">Baud Rate:</label>
            <select id="baud-selector"
                style="width: 100%; padding: 5px; background: #444; color: white; border: 1px solid #666; border-radius: 4px;">
                <option value="115200" selected>115200 (Arduino Uno R3)</option>
                <option value="57600">57600 (Old Uno/Nano/CH340)</option>
                <option value="460800">460800 (ESP32 Default)</option>
                <option value="19200">19200 (Older ATMega)</option>
            </select>
        </div>

        <button id="btn-stk500-test"
            style="width: 100%; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 5px;">
            測試燒錄 Blink (Arduino)
        </button>

        <button id="btn-esp32-test"
            style="width: 100%; padding: 10px; background: #e67e22; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 10px;">
            測試燒錄 Blink (ESP32)
        </button>

        <button id="btn-close-port"
            style="width: 100%; padding: 5px; background: #c0392b; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 11px;">
            強制關閉序列埠
        </button>

        <!-- 本地檔案燒錄控制 (Phase 4) -->
        <div style="margin-top: 20px; padding-top: 15px; border-top: 1px dashed #fff5;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold; color: #fff;">
                🚀 燒錄預編譯檔案 (.hex / .bin)
            </label>
            <input type="file" id="local-file-input"
                style="width: 100%; margin-bottom: 10px; background: rgba(255,255,255,0.1); border: 1px solid #fff3; color: white; padding: 5px; border-radius: 4px;">

            <div style="display: flex; gap: 10px;">
                <button id="flash-uploaded-arduino"
                    style="flex: 1; padding: 10px; background-color: #008184; color: white; border: none; border-radius: 6px; cursor: pointer;">
                    燒錄至 Arduino
                </button>
                <button id="flash-uploaded-esp32"
                    style="flex: 1; padding: 10px; background-color: #d35400; color: white; border: none; border-radius: 6px; cursor: pointer;">
                    燒錄至 ESP32
                </button>
            </div>
        </div>

        <div id="stk500-log"
            style="height: 250px; overflow-y: auto; background-color: #1e1e1e; border: 1px solid #333; padding: 10px; font-family: monospace; font-size: 13px; color: #d4d4d4; border-radius: 8px;">
            <div style="color: #6a9955;">--- Web Serial 燒錄日誌 ---</div>
        </div>
    </div>

    <script>
        // 初始化日誌監聽
        const logEl = document.getElementById('stk500-log');
        const fileInput = document.getElementById('local-file-input');

        const logger = (msg, isError = false) => {
            const time = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.style.color = isError ? '#f44336' : '#d4d4d4';
            div.textContent = `[${time}] ${msg}`;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
            console.log(msg);
        };

        window.serialManager = new SerialManager(logger);

        // Arduino 測試
        document.getElementById('test-arduino-blink').addEventListener('click', async () => {
            try {
                logger("--- 開始 STK500 Web Serial 測試 ---");
                const baud = parseInt(document.getElementById('baud-select').value);

                const response = await fetch('web-flasher/test-blink.hex');
                const hexText = await response.text();

                const flasher = new Stk500WebFlasher(serialManager, logger);
                await flasher.flashHex(hexText, baud);
                logger("!!! 測試燒錄 Blink 成功 !!!");
            } catch (e) {
                logger(`[錯誤] ${e.message}`, true);
            }
        });

        // ESP32 測試
        document.getElementById('test-esp32-connect').addEventListener('click', async () => {
            try {
                logger("--- 開始 ESP32 Web Serial 測試 ---");
                const flasher = new Esp32WebFlasher(serialManager, logger);
                await flasher.flashTestBlink();
                logger("!!! ESP32 測試成功 !!!");
            } catch (e) {
                logger(`[錯誤] ${e.message}`, true);
            }
        });

        // 燒錄上傳的檔案 (Arduino)
        document.getElementById('flash-uploaded-arduino').addEventListener('click', async () => {
            if (!fileInput.files[0]) return alert("請先選擇一個 .hex 檔案");
            try {
                logger("--- 開始燒錄自選 Hex 檔至 Arduino ---");
                const baudConstraint = parseInt(document.getElementById('baud-select').value);
                const hexText = await fileInput.files[0].text();

                const flasher = new Stk500WebFlasher(serialManager, logger);
                await flasher.flashHex(hexText, baudConstraint);
                logger("!!! 燒錄完成 !!!");
            } catch (e) {
                logger(`[錯誤] ${e.message}`, true);
            }
        });

        // 燒錄上傳的檔案 (ESP32)
        document.getElementById('flash-uploaded-esp32').addEventListener('click', async () => {
            if (!fileInput.files[0]) return alert("請先選擇一個 .bin 檔案");
            try {
                logger("--- 開始燒錄自選 Bin 檔至 ESP32 ---");
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const data = new Uint8Array(e.target.result);
                        const flasher = new Esp32WebFlasher(serialManager, logger);
                        const fileArray = [{ data: data, address: 0x10000 }];
                        await flasher.flashData(fileArray);
                        logger("!!! 燒錄完成 !!!");
                    } catch (err) {
                        logger(`[錯誤] ${err.message}`, true);
                    }
                };
                reader.readAsArrayBuffer(fileInput.files[0]);
            } catch (e) {
                logger(`[錯誤] ${e.message}`, true);
            }
        });

        document.getElementById('btn-close-port').addEventListener('click', async () => {
            await serialManager.close();
            logger("序列埠已強制關閉。");
        });
    </script>
</body>

</html>
